<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dana Chou</title>
<link rel="stylesheet" href="styles.css?v=3">
</head>
<body>

<div id="split">

  <!-- LEFT -->
  <div id="left">
    <div id="scroll-area">
      <div class="intro">
        <div class="name">Dana Chou</div>
        <div class="tagline">
          Deep tech software designer slinging some code around. No one has complained yet.<br><Br>
          Select or type one of these into the command line.<br>
        </div>
      </div>

      <div class="hints">
        <span class="hints-lead"><span class="cmd" onclick="runCommand('work')">work</span> &nbsp;
        <span class="cmd" onclick="runCommand('process')">process</span> &nbsp;
        <span class="cmd" onclick="runCommand('changelog')">changelog</span> &nbsp;
        <span class="cmd" onclick="runCommand('what did you build at airbase?')">ask me anything</span>
      </div>

      <div id="output"></div>
      <div class="scroll-spacer"></div>
    </div>

    <div id="input-bar">
      <input id="cmd-input" type="text" placeholder="type a command or ask anything..." autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div id="panel-header">
      <span id="panel-co" class="panel-co-placeholder"></span>
      <span id="panel-role"></span>
    </div>
    <div id="panel-image">
      <div class="panel-empty" id="panel-empty"></div>
    </div>
    <div id="panel-footer">
      <span id="panel-label"></span>
      <span class="panel-hint" id="panel-hint"></span>
      <span id="panel-counter"></span>
    </div>
  </div>

</div>

<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="dana-context.js?v=3"></script>
<script src="changelog.js?v=3"></script>
<script>
function iconHtml(name, extraClass = '') {
  const cls = ['lucide-icon', extraClass].filter(Boolean).join(' ');
  return `<i data-lucide="${name}" class="${cls}" aria-hidden="true"></i>`;
}

function refreshLucide() {
  if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
}

/* ── WORK DATA ──
   Replace img paths with your actual screenshot filenames.
   Put screenshots in the same folder as this HTML file.
   Suggested naming: airbase-01.png, gecko-01.png, etc.
*/
const WORK = [
  {
    co: 'Airbase',
    role: 'Founding Designer · Jan 2026–present',
    desc: `Backed by a16z. Building software for RF spectrum licensing, coordination, and intelligence in the AI-era.`,
    tags: ['Claude','Paper.design', 'Flora', 'Linear Agent', 'Figma MCP', 'Seriously 0→1',],
    screens: [
      { img: 'airbase-01.png', label: 'logo' },
      { img: 'airbase-02.png', label: 'company website' },
    ]
  },
  {
    co: 'Gecko Robotics',
    role: 'Product Designer — Cantilever',
    desc: `AI + Robotics platform to diagnose and understand the health of critical infrastructure. Designed for US Navy, US Air Force, Oil & Gas, and Power accounts.`,
    tags: ['Cursor','Figma MCP'],
    screens: [
      { img: 'gecko-01.png', label: 'LLM agent interface' },
      { img: 'gecko-04.png', label: 'platform landing page' },
    ]
  },
  {
    co: 'True Anomaly',
    role: 'Sr. Product Designer — Mosaic',
    desc: `Mission control software for space defense satellites. Lead designer focused on telemetry, tracking, and command (TT&C).`,
    tags: ['Figma', 'Storybook'],
    screens: [
      { img: 'trueanomaly-01.png', label: 'satellite communications view' },
      { img: 'trueanomaly-02.png', label: 'orbital maneuver builder cards' },
      { img: 'trueanomaly-03.png', label: 'mission work planning (concept)' },
      { img: 'trueanomaly-04.png', label: 'flight software scripting (concept)' },
    ]
  },
  {
    co: 'BlueHalo',
    role: 'Product Designer — Titan C-UAS',
    desc: `Titan C-UAS: autonomous hardware-software system for RF drone detection and jamming. DoD Program of Record.`,
    tags: ['Figma', 'HTML/CSS'],
    screens: [
      { img: 'bluehalo-01.png', label: 'images coming soon.' },
    ]
  }
];

const COMMANDS = {
  work: () => {
    const html = `<div class="output-block">
      <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">work</span></div>
      <div class="output-content">
        ${WORK.map((w,i) => `<div class="work-entry" id="we-${i}" onclick="selectWork(${i})">
          <div class="work-header">
            <span class="work-company">${w.co}</span>
            <span class="work-year">${w.role.split('·')[1] ? w.role.split('·')[1].trim() : ''}</span>
          </div>
          <div class="work-role">${w.role.split('·')[0].trim()}</div>
          <div class="work-desc">${w.desc}</div>
          <div class="work-tags">${w.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>`).join('')}
      </div>
    </div>`;
    setTimeout(() => selectWork(0), 50);
    return html;
  },


  process: () => `<div class="output-block">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">process</span></div>
    <div class="output-content">
      <div class="process-block">
        <div class="process-step">
          <span class="process-icon">${iconHtml('brain')}</span>
          <div>
            <div class="process-title">synthesis</div>
            <div class="process-desc">Use Granola to aggregate deep user research context. Analyze user feedback and user testing benchmarks.</div>
          </div>
        </div>
        <div class="process-step">
          <span class="process-icon">${iconHtml('lightbulb')}</span>
          <div>
            <div class="process-title">discovery</div>
            <div class="process-desc">whiteboarding with engineers to define core product capabilities and requirements.</div>
          </div>
        </div>
        <div class="process-step">
          <span class="process-icon">${iconHtml('list-checks')}</span>
          <div>
            <div class="process-title">decomposition</div>
            <div class="process-desc">Prompt Linear Agent to crystallize and generate source-of-truth requirements. Automatically outputs engineering tickets, then pull tickets into Cursor.</div>
          </div>
        </div>
        <div class="process-step">
          <span class="process-icon">${iconHtml('pencil')}</span>
          <div>
            <div class="process-title">design</div>
            <div class="process-desc">Leverage Paper.design, Figma MCP, and Claudefor high exploration output. Take the best ideas and visually refine across all three tools.</div>
          </div>
        </div>
        <div class="process-step">
          <span class="process-icon">${iconHtml('code')}</span>
          <div>
            <div class="process-title">implementation</div>
            <div class="process-desc">Cursor for pushing to prod.</div>
          </div>
        </div>
      </div>
    </div>
  </div>`,

  changelog: () => {
    const rows = CHANGELOG_ENTRIES.map(
      (e) => `<div class="cl-entry"><span class="cl-v">${e.v}</span><span class="cl-text">${e.body}</span></div>`
    ).join('');
    return `<div class="output-block">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">changelog</span></div>
    <div class="output-content">
      ${rows}
    </div>
  </div>`;
  },

  help: () => `<div class="output-block">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">help</span></div>
    <div class="output-content">
      <div class="help-block">
        work &nbsp;&nbsp;&nbsp;&nbsp;— roles and what was built<br>
        process &nbsp;&nbsp;— design workflow<br>
        changelog — the real story<br>
        clear &nbsp;&nbsp;&nbsp;— clear terminal<br>
        <span class="help-block-dim">${iconHtml('arrow-left','help-kbd-icon')}${iconHtml('arrow-right','help-kbd-icon')} &nbsp;&nbsp;&nbsp;&nbsp;— browse screenshots on the right<br>
        anything else ${iconHtml('arrow-right','help-kbd-icon')} ask</span>
      </div>
    </div>
  </div>`,
};

/* ── PANEL STATE ── */
let activeWork = null;
let activeScreen = 0;

function selectWork(idx) {
  activeWork = idx;
  activeScreen = 0;
  updatePanel();
  document.querySelectorAll('.work-entry').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function updatePanel() {
  if (activeWork === null) return;
  const w = WORK[activeWork];
  const s = w.screens[activeScreen];

  const panelCo = document.getElementById('panel-co');
  panelCo.textContent = w.co;
  panelCo.classList.remove('panel-co-placeholder');
  panelCo.classList.add('panel-co--active');
  document.getElementById('panel-role').textContent = w.role;

  const imageEl = document.getElementById('panel-image');
  const panelEmpty = document.getElementById('panel-empty');
  panelEmpty.classList.add('is-hidden');

  let img = imageEl.querySelector('img');
  if (!img) {
    img = document.createElement('img');
    imageEl.appendChild(img);
  }
  img.classList.remove('loaded', 'is-hidden');
  img.alt = s.label;
  img.src = s.img;
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => {
    img.classList.add('is-hidden');
    panelEmpty.classList.remove('is-hidden');
    panelEmpty.textContent = 'images coming soon.';
  };

  document.getElementById('panel-label').textContent = s.label;
  document.getElementById('panel-counter').textContent = `${activeScreen + 1} / ${w.screens.length}`;
  const hintEl = document.getElementById('panel-hint');
  hintEl.innerHTML = `${iconHtml('arrow-left','panel-hint-icon')}${iconHtml('arrow-right','panel-hint-icon')}<span class="panel-hint-label"> to browse</span>`;
  refreshLucide();
}

function nextScreen(dir) {
  if (activeWork === null) return;
  const len = WORK[activeWork].screens.length;
  activeScreen = (activeScreen + dir + len) % len;
  updatePanel();
}

/* ── TERMINAL LOGIC ── */
const output = document.getElementById('output');
const input = document.getElementById('cmd-input');

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const sa = document.getElementById('scroll-area');
  sa.scrollTop = sa.scrollHeight;
}

function runCommand(raw) {
  const trimmed = raw.trim();
  const lower = trimmed.toLowerCase();
  if (!trimmed) return;

  if (lower === 'clear') {
    output.innerHTML = '';
    input.value = '';
    return;
  }

  if (COMMANDS[lower]) {
    output.insertAdjacentHTML('beforeend', COMMANDS[lower]());
    refreshLucide();
    input.value = '';
    scrollBottom();
    return;
  }

  runAI(trimmed);
  input.value = '';
  scrollBottom();
}

async function runAI(question) {
  const id = 'ai-' + Date.now();
  output.insertAdjacentHTML('beforeend', `<div class="output-block" id="${id}">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">${escapeHtml(question)}</span></div>
    <div class="output-content">
      <div class="ai-text" id="${id}-text"><span class="text-muted-loading">...</span></div>
    </div>
  </div>`);
  refreshLucide();
  scrollBottom();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        stream: true,
        system: DANA_CONTEXT,
        messages: [{ role: 'user', content: question }]
      })
    });

    const el = document.getElementById(`${id}-text`);
    el.innerHTML = '';
    let text = '';
    const reader = res.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const p = JSON.parse(data);
          if (p.type === 'content_block_delta' && p.delta?.text) {
            text += p.delta.text;
            el.innerHTML = escapeHtml(text).replace(/\n/g,'<br>') + '<span class="ai-cursor"></span>';
            scrollBottom();
          }
        } catch {}
      }
    }
    el.innerHTML = escapeHtml(text).replace(/\n/g,'<br>');
  } catch {
    const el = document.getElementById(`${id}-text`);
    if (el) el.innerHTML = '<span class="text-error-dim">out of tokens :(</span>';
  }
  scrollBottom();
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (document.activeElement === input) {
    if (e.key === 'Enter') { runCommand(input.value); return; }
    return;
  }
  if (e.key === 'ArrowRight') nextScreen(1);
  if (e.key === 'ArrowLeft') nextScreen(-1);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') runCommand(input.value);
});

/* Arrow keys work even when input is focused, but only for panel nav */
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && input.value === '') { e.preventDefault(); nextScreen(1); }
  if (e.key === 'ArrowLeft' && input.value === '') { e.preventDefault(); nextScreen(-1); }
});

input.focus();
refreshLucide();
</script>
</body>
</html>
