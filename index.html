<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dana Chou</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="split">

  <!-- LEFT -->
  <div id="left">
    <div id="scroll-area">
      <div class="intro">
        <div class="name">Dana Chou</div>
        <div class="tagline">
          <span class="hl">Deep tech software designer slinging code. No engineers have complained yet.</span><br><Br>
          Select or type any of the actions below into the command line.<br>
        </div>
      </div>

      <div class="hints">
        <span class="hints-lead"><span class="cmd" onclick="runCommand('work')">work</span> &nbsp;
        <span class="cmd" onclick="runCommand('how')">how</span> &nbsp;
        <span class="cmd" onclick="runCommand('now')">now</span> &nbsp;
        <span class="cmd" onclick="runCommand('changelog')">changelog</span> &nbsp;
        <span class="cmd" onclick="runCommand('what did you build at airbase?')">ask me anything</span>
      </div>

      <div id="output"></div>
      <div class="scroll-spacer"></div>
    </div>

    <div id="input-bar">
      <input id="cmd-input" type="text" placeholder="type a command or ask anything..." autocomplete="off" spellcheck="false" />
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div id="panel-header">
      <span id="panel-co" class="panel-co-placeholder"><span class="panel-co-msg">type or click 'work'</span></span>
      <span id="panel-role"></span>
      <span id="panel-blurb"></span>
    </div>
    <div id="panel-image">
      <div class="panel-empty" id="panel-empty">
        type 'work'<br>click a role<br><span class="panel-empty-nav">use <i data-lucide="chevron-left" class="lucide-icon" aria-hidden="true"></i><i data-lucide="chevron-right" class="lucide-icon" aria-hidden="true"></i> to browse</span>
      </div>
    </div>
    <div id="panel-footer">
      <span id="panel-label"></span>
      <span class="panel-hint" id="panel-hint"></span>
      <span id="panel-counter"></span>
    </div>
  </div>

</div>

<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="dana-context.js"></script>
<script src="changelog.js"></script>
<script>
function iconHtml(name, extraClass = '') {
  const cls = ['lucide-icon', extraClass].filter(Boolean).join(' ');
  return `<i data-lucide="${name}" class="${cls}" aria-hidden="true"></i>`;
}

function refreshLucide() {
  if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
}

/* ── WORK DATA ──
   Replace img paths with your actual screenshot filenames.
   Put screenshots in the same folder as this HTML file.
   Suggested naming: airbase-01.png, gecko-01.png, etc.
*/
const WORK = [
  {

    desc: `Titan: counter-drone hardware-software system. Field operators, no cloud, no specialists. <span class="hl">First designer hired</span> at Citadel; stayed through BlueHalo acquisition.<br><br>66% of "hardware performance" tickets were UX failures. Redesigned IA, rewrote settings language, unified 800+ components, built Unit Info screen. <span class="hl">35% drop in tickets. 100% satisfaction on re-engagement.</span><br><br>Brand + marketing with CEO → successful M&A. Titan: <span class="stat">$75M+ sales, DoD Program of Record.</span>`,

      { img: 'bluehalo-02.png', label: 'threat tracking interface' },

    ]

];

const COMMANDS = {
  work: () => {
    const html = `<div class="output-block">
      <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">work</span></div>
      <div class="output-content">
        <div class="section-label">experience</div>
        ${WORK.map((w,i) => `<div class="work-entry" id="we-${i}" onclick="selectWork(${i})">
          <div class="work-header">
            <span class="work-company">${w.co}</span>
            <span class="work-year">${w.role.split('·')[1] ? w.role.split('·')[1].trim() : ''}</span>
          </div>
          <div class="work-role">${w.role.split('·')[0].trim()}</div>
          <div class="work-desc">${w.desc}</div>
          <div class="work-tags">${w.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        </div>`).join('')}
      </div>
    </div>`;
    setTimeout(() => selectWork(0), 50);
    return html;
  },

  how: () => `<div class="output-block">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">how</span></div>
    <div class="output-content">
      <div class="section-label">workflow</div>
      <div class="how-step"><span class="num">01 — design</span><span class="text">Everything starts in <span class="hl">Figma</span>. Tokens, components, spacing — decided before a line of code is written.</span></div>
      <div class="how-step"><span class="num">02 — bridge</span><span class="text"><span class="hl">Figma MCP</span> connects the design file directly to Cursor. No redlines. No handoff. No gap.</span></div>
      <div class="how-step"><span class="num">03 — build</span><span class="text"><span class="hl">Cursor</span> reads the design and writes the code. I review, redirect, adjust. Not writing every line — making every decision.</span></div>
      <div class="how-step"><span class="num">04 — think</span><span class="text"><span class="hl">Claude</span> for systems thinking — architecture, tradeoffs, writing. Also built Claude skills for my engineering team: UI polish, linting, design reviews.</span></div>
      <div class="how-step"><span class="num">05 — enforce</span><span class="text">Building <span class="hl">eslint-plugin-design-system</span> — ESLint rules catching design token violations at the code level. Next: MCP server wrapper for Cursor agents.</span></div>
      <div class="how-step how-step--aside"><span class="text">Didn't know what git was 18 months ago. ~300 contributions since. Now writing rules that flag engineers' code as wrong. Unclear if ironic or inevitable.</span></div>
    </div>
  </div>`,

  now: () => `<div class="output-block">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">now</span></div>
    <div class="output-content">
      <div class="now-line">
        <span>
          Founding Designer at <a href="https://airbase.us" style="color: #FAFAFA; text-decoration: none;" onmouseover="this.style.textDecoration='underline'; this.style.textDecorationColor='#FAFAFA';" onmouseout="this.style.textDecoration='none';" target="_blank" rel="noopener noreferrer">Airbase</a> (a16z), building the brand, product, and office polaroid wall.
     
        </span>
      </div>
  </div>`,

  changelog: () => {
    const rows = CHANGELOG_ENTRIES.map(
      (e) => `<div class="cl-entry"><span class="cl-v">${e.v}</span><span class="cl-text">${e.body}</span></div>`
    ).join('');
    return `<div class="output-block">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">changelog</span></div>
    <div class="output-content">
      <div class="section-label">${CHANGELOG_SECTION_TITLE}</div>
      ${rows}
    </div>
  </div>`;
  },

  help: () => `<div class="output-block">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">help</span></div>
    <div class="output-content">
      <div class="help-block">
        work &nbsp;&nbsp;&nbsp;&nbsp;— roles and what was built<br>
        how &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;— workflow and tools<br>
        now &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;— what's being built right now<br>
        changelog — the real story<br>
        clear &nbsp;&nbsp;&nbsp;— clear terminal<br>
        <span class="help-block-dim">${iconHtml('chevron-left','help-kbd-icon')}${iconHtml('chevron-right','help-kbd-icon')} &nbsp;&nbsp;&nbsp;&nbsp;— browse screenshots on the right<br>
        anything else ${iconHtml('arrow-right','help-kbd-icon')} ask</span>
      </div>
    </div>
  </div>`,
};

/* ── PANEL STATE ── */
let activeWork = null;
let activeScreen = 0;

function selectWork(idx) {
  activeWork = idx;
  activeScreen = 0;
  updatePanel();
  document.querySelectorAll('.work-entry').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function updatePanel() {
  if (activeWork === null) return;
  const w = WORK[activeWork];
  const s = w.screens[activeScreen];

  const panelCo = document.getElementById('panel-co');
  panelCo.textContent = w.co;
  panelCo.classList.remove('panel-co-placeholder');
  panelCo.classList.add('panel-co--active');
  document.getElementById('panel-role').textContent = w.role;
  document.getElementById('panel-blurb').textContent = w.blurb;

  const imageEl = document.getElementById('panel-image');
  const panelEmpty = document.getElementById('panel-empty');
  panelEmpty.classList.add('is-hidden');

  let img = imageEl.querySelector('img');
  if (!img) {
    img = document.createElement('img');
    imageEl.appendChild(img);
  }
  img.classList.remove('loaded', 'is-hidden');
  img.alt = s.label;
  img.src = s.img;
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => {
    img.classList.add('is-hidden');
    panelEmpty.classList.remove('is-hidden');
    panelEmpty.textContent = s.label + '\n(add screenshot: ' + s.img + ')';
  };

  document.getElementById('panel-label').textContent = s.label;
  document.getElementById('panel-counter').textContent = `${activeScreen + 1} / ${w.screens.length}`;
  const hintEl = document.getElementById('panel-hint');
  hintEl.innerHTML = `${iconHtml('chevron-left','panel-hint-icon')}${iconHtml('chevron-right','panel-hint-icon')}<span class="panel-hint-label"> to browse</span>`;
  refreshLucide();
}

function nextScreen(dir) {
  if (activeWork === null) return;
  const len = WORK[activeWork].screens.length;
  activeScreen = (activeScreen + dir + len) % len;
  updatePanel();
}

/* ── TERMINAL LOGIC ── */
const output = document.getElementById('output');
const input = document.getElementById('cmd-input');

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const sa = document.getElementById('scroll-area');
  sa.scrollTop = sa.scrollHeight;
}

function runCommand(raw) {
  const trimmed = raw.trim();
  const lower = trimmed.toLowerCase();
  if (!trimmed) return;

  if (lower === 'clear') {
    output.innerHTML = '';
    input.value = '';
    return;
  }

  if (COMMANDS[lower]) {
    output.insertAdjacentHTML('beforeend', COMMANDS[lower]());
    refreshLucide();
    input.value = '';
    scrollBottom();
    return;
  }

  runAI(trimmed);
  input.value = '';
  scrollBottom();
}

async function runAI(question) {
  const id = 'ai-' + Date.now();
  output.insertAdjacentHTML('beforeend', `<div class="output-block" id="${id}">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">${escapeHtml(question)}</span></div>
    <div class="output-content">
      <div class="section-label">response</div>
      <div class="ai-text" id="${id}-text"><span class="text-muted-loading">...</span></div>
    </div>
  </div>`);
  refreshLucide();
  scrollBottom();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        stream: true,
        system: DANA_CONTEXT,
        messages: [{ role: 'user', content: question }]
      })
    });

    const el = document.getElementById(`${id}-text`);
    el.innerHTML = '';
    let text = '';
    const reader = res.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const p = JSON.parse(data);
          if (p.type === 'content_block_delta' && p.delta?.text) {
            text += p.delta.text;
            el.innerHTML = escapeHtml(text).replace(/\n/g,'<br>') + '<span class="ai-cursor"></span>';
            scrollBottom();
          }
        } catch {}
      }
    }
    el.innerHTML = escapeHtml(text).replace(/\n/g,'<br>');
  } catch {
    const el = document.getElementById(`${id}-text`);
    if (el) el.innerHTML = '<span class="text-error-dim">something went wrong.</span>';
  }
  scrollBottom();
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (document.activeElement === input) {
    if (e.key === 'Enter') { runCommand(input.value); return; }
    return;
  }
  if (e.key === 'ArrowRight') nextScreen(1);
  if (e.key === 'ArrowLeft') nextScreen(-1);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') runCommand(input.value);
});

/* Arrow keys work even when input is focused, but only for panel nav */
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && input.value === '') { e.preventDefault(); nextScreen(1); }
  if (e.key === 'ArrowLeft' && input.value === '') { e.preventDefault(); nextScreen(-1); }
});

input.focus();
refreshLucide();
</script>
</body>
</html>
