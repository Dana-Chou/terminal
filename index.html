/* ── PANEL STATE ── */
let activeWork = null;
let activeScreen = 0;

function selectWork(idx) {
  activeWork = idx;
  activeScreen = 0;
  updatePanel();
  document.querySelectorAll('.work-entry').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function updatePanel() {
  if (activeWork === null) return;
  const w = WORK[activeWork];
  const s = w.screens[activeScreen];

  const panelCo = document.getElementById('panel-co');
  panelCo.textContent = w.co;
  panelCo.classList.remove('panel-co-placeholder');
  panelCo.classList.add('panel-co--active');
  document.getElementById('panel-role').textContent = w.role;
  document.getElementById('panel-blurb').textContent = w.blurb;

  const imageEl = document.getElementById('panel-image');
  const panelEmpty = document.getElementById('panel-empty');
  panelEmpty.classList.add('is-hidden');

  let img = imageEl.querySelector('img');
  if (!img) {
    img = document.createElement('img');
    imageEl.appendChild(img);
  }
  img.classList.remove('loaded', 'is-hidden');
  img.alt = s.label;
  img.src = s.img;
  img.onload = () => img.classList.add('loaded');
  img.onerror = () => {
    img.classList.add('is-hidden');
    panelEmpty.classList.remove('is-hidden');
    panelEmpty.textContent = s.label + '\n(add screenshot: ' + s.img + ')';
  };

  document.getElementById('panel-label').textContent = s.label;
  document.getElementById('panel-counter').textContent = `${activeScreen + 1} / ${w.screens.length}`;
  const hintEl = document.getElementById('panel-hint');
  hintEl.innerHTML = `${iconHtml('chevron-left','panel-hint-icon')}${iconHtml('chevron-right','panel-hint-icon')}<span class="panel-hint-label"> to browse</span>`;
  refreshLucide();
}

function nextScreen(dir) {
  if (activeWork === null) return;
  const len = WORK[activeWork].screens.length;
  activeScreen = (activeScreen + dir + len) % len;
  updatePanel();
}

/* ── TERMINAL LOGIC ── */
const output = document.getElementById('output');
const input = document.getElementById('cmd-input');

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const sa = document.getElementById('scroll-area');
  sa.scrollTop = sa.scrollHeight;
}

function runCommand(raw) {
  const trimmed = raw.trim();
  const lower = trimmed.toLowerCase();
  if (!trimmed) return;

  if (lower === 'clear') {
    output.innerHTML = '';
    input.value = '';
    return;
  }

  if (COMMANDS[lower]) {
    output.insertAdjacentHTML('beforeend', COMMANDS[lower]());
    refreshLucide();
    input.value = '';
    scrollBottom();
    return;
  }

  runAI(trimmed);
  input.value = '';
  scrollBottom();
}

async function runAI(question) {
  const id = 'ai-' + Date.now();
  output.insertAdjacentHTML('beforeend', `<div class="output-block" id="${id}">
    <div class="prompt-line"><span class="prompt-char">${iconHtml('chevron-right')}</span><span class="prompt-cmd">${escapeHtml(question)}</span></div>
    <div class="output-content">
      <div class="section-label">response</div>
      <div class="ai-text" id="${id}-text"><span class="text-muted-loading">...</span></div>
    </div>
  </div>`);
  refreshLucide();
  scrollBottom();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        stream: true,
        system: DANA_CONTEXT,
        messages: [{ role: 'user', content: question }]
      })
    });

    const el = document.getElementById(`${id}-text`);
    el.innerHTML = '';
    let text = '';
    const reader = res.body.getReader();
    const dec = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const lines = dec.decode(value).split('\n');
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        try {
          const p = JSON.parse(data);
          if (p.type === 'content_block_delta' && p.delta?.text) {
            text += p.delta.text;
            el.innerHTML = escapeHtml(text).replace(/\n/g,'<br>') + '<span class="ai-cursor"></span>';
            scrollBottom();
          }
        } catch {}
      }
    }
    el.innerHTML = escapeHtml(text).replace(/\n/g,'<br>');
  } catch {
    const el = document.getElementById(`${id}-text`);
    if (el) el.innerHTML = '<span class="text-error-dim">something went wrong.</span>';
  }
  scrollBottom();
}

/* ── KEYBOARD ── */
document.addEventListener('keydown', e => {
  if (document.activeElement === input) {
    if (e.key === 'Enter') { runCommand(input.value); return; }
    return;
  }
  if (e.key === 'ArrowRight') nextScreen(1);
  if (e.key === 'ArrowLeft') nextScreen(-1);
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') runCommand(input.value);
});

/* Arrow keys work even when input is focused, but only for panel nav */
input.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && input.value === '') { e.preventDefault(); nextScreen(1); }
  if (e.key === 'ArrowLeft' && input.value === '') { e.preventDefault(); nextScreen(-1); }
});

input.focus();
refreshLucide();
